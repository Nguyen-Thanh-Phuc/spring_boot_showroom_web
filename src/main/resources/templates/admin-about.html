<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/w3.css}">
    <link rel="stylesheet" th:href="@{/showroom.css}">
    <title th:text="|${companyName.shortName} - ${companyName.longName} - Admin About|">Cedar Ridge - Cedar Ridge Custom Homes - Admin About</title>
</head>
<body>
<div th:replace="~{navbar}"></div>
<div class="w3-content w3-padding w3-card" style="max-width:700px">
    <div class="w3-container w3-padding-32">
        <h3 class="w3-border-bottom w3-border-light-grey w3-padding-16">About Content</h3>
        <div th:if="${errorMsg}" th:text="${errorMsg}" class="w3-text-red"></div>
        <div th:if="${successMsg}" th:text="${successMsg}" class="w3-text-green"></div>
        <form method="post" th:action="@{/admin/about}">
            <p>
                <label for="aboutContent">About content</label>
                <textarea id="aboutContent" name="aboutContent" rows="6"
                          class="w3-input w3-border fixed-input"
                          th:text="${aboutContent}"></textarea>
            </p>
            <div class="w3-center">
                <input type="submit" class="w3-button w3-black" value="Save">
            </div>
        </form>
    </div>
</div>
</body>
</html>
